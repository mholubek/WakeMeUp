name: Build WakeMeUp Add-on

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore wakemeup/WakeMeUp.csproj

      - name: Build
        run: dotnet build wakemeup/WakeMeUp.csproj --configuration Release --no-restore

  build-addon-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build add-on image
        uses: docker/build-push-action@v6
        with:
          context: ./wakemeup
          file: ./wakemeup/Dockerfile
          push: false
          platforms: linux/amd64
          tags: wakemeup:test
          build-args: |
            BUILD_VERSION=0.1.7
            BUILD_ARCH=amd64
